<article
  class="group relative flex gap-3 mb-4 rounded-xl border p-3 sm:rounded-2xl sm:p-4 border-[#dbeafe] animate-pulse bg-white"
>
  <!-- Avatar + icon -->
  <div class="relative shrink-0">
    <div class="h-11 w-11 rounded-full bg-gray-300"></div>

    <!-- small icon -->
    <div
      class="absolute -bottom-1 -right-1 h-5 w-5 rounded-full bg-gray-200 ring-2 ring-white"
    ></div>
  </div>

  <!-- Content -->
  <div class="min-w-0 flex-1">
    <!-- Top row -->
    <div class="flex flex-wrap items-start justify-between gap-2">
      <!-- Text -->
      <div class="space-y-1">
        <div class="h-3 w-40 bg-gray-300 rounded"></div>
      </div>

      <!-- Right side (time + icon) -->
      <div class="flex items-center gap-2">
        <div class="h-6 w-6 bg-gray-300 rounded-md"></div>
      </div>
    </div>

    <!-- Body -->
    <div class="mt-1 space-y-1">
      <div class="h-3 w-20 bg-gray-200 rounded"></div>
    </div>

    <!-- Bottom actions -->
    <div class="mt-2 flex items-center gap-2">
      <div class="h-6 w-24 bg-gray-300 rounded-md"></div>
    </div>
  </div>
</article>
