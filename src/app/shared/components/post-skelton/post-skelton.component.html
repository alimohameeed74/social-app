<article
  role="status"
  class="animate-pulse mb-2 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_1px_6px_rgba(15,23,42,.05)]"
>
  <div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <!-- Avatar -->
        <div class="h-10 w-10 rounded-full bg-gray-300"></div>

        <!-- Name + Username -->
        <div class="space-y-2">
          <div class="h-3 w-24 rounded bg-gray-300"></div>
          <div class="h-2 w-16 rounded bg-gray-200"></div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex gap-2">
        <div class="h-6 w-6 rounded bg-gray-300"></div>
        <div class="h-6 w-6 rounded bg-gray-300"></div>
        <div class="h-6 w-6 rounded bg-gray-300"></div>
      </div>
    </div>

    <!-- Body text -->
    <div class="mt-4 space-y-2">
      <div class="h-3 w-full rounded bg-gray-200"></div>
      <div class="h-3 w-5/6 rounded bg-gray-200"></div>
      <div class="h-3 w-4/6 rounded bg-gray-200"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex gap-4">
      <div class="h-3 w-16 rounded bg-gray-200"></div>
      <div class="h-3 w-16 rounded bg-gray-200"></div>
      <div class="h-3 w-16 rounded bg-gray-200"></div>
    </div>

    <div class="h-3 w-10 rounded bg-gray-200"></div>
  </div>

  <span class="sr-only">Loading...</span>
</article>
