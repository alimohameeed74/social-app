<article
  role="status"
  class="animate-pulse overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm mb-3"
>
  <!-- Header -->
  <div class="p-4">
    <div class="flex items-center gap-3">
      <!-- avatar -->
      <div class="h-11 w-11 rounded-full bg-gray-300"></div>

      <div class="flex-1 space-y-2">
        <!-- name -->
        <div class="h-3 w-32 rounded bg-gray-300"></div>

        <!-- username + meta -->
        <div class="flex gap-2">
          <div class="h-2 w-20 rounded bg-gray-200"></div>
          <div class="h-2 w-10 rounded bg-gray-200"></div>
          <div class="h-2 w-16 rounded bg-gray-200"></div>
        </div>
      </div>

      <!-- save button -->
      <div class="h-8 w-8 rounded bg-gray-300"></div>
    </div>

    <!-- body -->
    <div class="mt-3 space-y-2">
      <div class="h-3 w-full rounded bg-gray-200"></div>
      <div class="h-3 w-5/6 rounded bg-gray-200"></div>
      <div class="h-3 w-4/6 rounded bg-gray-200"></div>
    </div>
  </div>

  <!-- stats -->
  <div class="px-4 pt-3 pb-2">
    <div class="flex justify-between items-center">
      <div class="h-3 w-24 rounded bg-gray-200"></div>

      <div class="flex gap-3">
        <div class="h-3 w-16 rounded bg-gray-200"></div>
        <div class="h-3 w-16 rounded bg-gray-200"></div>
      </div>
    </div>
  </div>

  <div class="mx-4 border-t border-slate-200"></div>

  <!-- actions -->
  <div class="grid grid-cols-3 gap-1 p-2">
    <div class="h-8 rounded bg-gray-200"></div>
    <div class="h-8 rounded bg-gray-200"></div>
    <div class="h-8 rounded bg-gray-200"></div>
  </div>

  <span class="sr-only">Loading...</span>
</article>
