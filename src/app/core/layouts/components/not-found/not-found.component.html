<section class="h-75 pt-5 flex justify-center items-center">
  <button
    (click)="back()"
    class="absolute top-2 left-0 inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
  >
    <i class="fa-solid fa-arrow-left"></i>
    Back
  </button>
  <button
    (click)="goToFeed()"
    class="absolute top-2 right-0 inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
  >
    Feed
    <i class="fa-solid fa-arrow-right"></i>
  </button>
  <div class="flex flex-col items-center content-center">
    <i class="fa-regular text-7xl h-full text-black fa-face-frown mb-2"></i>
    <p class="font-bold mb-0 text-md sm:text-4xl">No pages found... please try again</p>
  </div>
</section>
