<section class="h-75 relative flex justify-center items-center">
  <button
    (click)="back()"
    class="absolute top-0 left-0 inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="lucide lucide-arrow-left"
      aria-hidden="true"
    >
      <path d="m12 19-7-7 7-7"></path>
      <path d="M19 12H5"></path></svg
    >Back
  </button>
  <button
    (click)="goToFeed()"
    class="absolute top-0 left-22 inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="lucide lucide-arrow-left"
      aria-hidden="true"
    >
      <path d="m12 19-7-7 7-7"></path>
      <path d="M19 12H5"></path></svg
    >Feed
  </button>
  <div class="flex flex-col items-center content-center">
    <i class="fa-regular text-7xl h-full text-black fa-face-frown mb-2"></i>
    <p class="font-bold mb-0 text-md sm:text-4xl">No pages found... please try again</p>
  </div>
</section>
