<section class="rounded-xl border border-slate-200 bg-white shadow-sm sm:rounded-2xl">
  <div class="border-b border-slate-200 p-4 sm:p-5">
    <div class="flex flex-wrap items-start justify-between gap-3">
      <div>
        <h2 class="text-xl font-black text-slate-900 sm:text-2xl">Notifications</h2>
        <p class="mt-1 text-sm text-slate-500">
          Realtime updates for likes, comments, shares, and follows.
        </p>
      </div>
      <button
        (click)="readAllNotifications()"
        [disabled]="isLoading_()"
        [class]="readCount() === 0 ? 'hidden' : 'inline-flex'"
        class="w-full items-center justify-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60 sm:w-auto"
      >
        <i [class]="isLoading_() ? 'fa-solid fa-spin fa-spinner' : 'fa-solid fa-check'"></i>
        Mark all as read
      </button>
    </div>
  </div>
  <div
    [class]="isLoading() || offline() || error() || emptyNotifications() ? 'hidden' : ''"
    class="space-y-2 p-3 sm:p-4"
  >
    @for (notification of notifications(); track $index) {
      <app-notification-card [notification]="notification"></app-notification-card>
    }
  </div>
  <app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
  <app-error [class.hidden]="!error()"></app-error>
  <div
    [class]="emptyNotifications() ? '' : 'hidden'"
    class="rounded-2xl border border-slate-200 bg-slate-50 p-8 text-center text-sm text-slate-500 shadow-sm"
  >
    No notifications yet.
  </div>
  <div [class.hidden]="!isLoading()" class="space-y-2 p-3 sm:p-4">
    @for (skelton of [1, 2, 3]; track $index) {
      <app-notification-skelton></app-notification-skelton>
    }
  </div>
</section>
