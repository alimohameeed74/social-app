<section class="mx-auto max-w-4xl space-y-4">
  <button
    (click)="back()"
    class="inline-flex items-center gap-2 rounded-md border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="lucide lucide-arrow-left"
      aria-hidden="true"
    >
      <path d="m12 19-7-7 7-7"></path>
      <path d="M19 12H5"></path></svg
    >Back to feed
  </button>
  <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="mb-3 flex items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-users text-[#1877f2]"
          aria-hidden="true"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
          <circle cx="9" cy="7" r="4"></circle>
        </svg>
        <h1 class="text-md sm:text-lg md:text-xl font-extrabold text-slate-900">
          All Suggested Friends
        </h1>
      </div>
      <span
        [class]="suggestions().length === 0 ? 'hidden' : 'flex'"
        class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600"
        >{{ suggestions().length }}</span
      >
    </div>

    <div
      [class]="isLoading() || offline() || error() ? 'hidden' : ''"
      class="grid gap-3 md:grid-cols-2"
    >
      @for (suggest of suggestions(); track $index) {
        <app-suggestion-card [suggestion]="suggest"></app-suggestion-card>
      }
    </div>
    <app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
    <app-error [class.hidden]="!error()"></app-error>
    <div [class]="!isLoading() ? 'hidden' : ''" class="grid gap-3 md:grid-cols-2">
      @for (skeltin of [1, 2, 3, 4, 5, 6]; track $index) {
        <app-suggestion-skelton></app-suggestion-skelton>
      }
    </div>
    <button
      (click)="getMoreSuggestions()"
      [disabled]="isLoading_()"
      [class]="suggestions().length === 0 ? 'hidden' : 'inline-flex'"
      class="mt-4 w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:opacity-50"
    >
      <i [class]="isLoading_() ? 'fa-solid fa-spin fa-spinner' : 'hidden'"></i>
      Load{{ isLoading_() ? 'ing' : '' }} more users
    </button>
  </section>
</section>
