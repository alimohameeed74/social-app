<article
  class="group relative flex gap-3 rounded-xl border mb-4 p-3 transition sm:rounded-2xl sm:p-4 border-[#dbeafe]"
  [class]="notification().isRead || isRead() ? 'bg-white' : 'bg-[#edf4ff]'"
>
  <div class="relative shrink-0">
    <button
      type="button"
      class="block cursor-pointer"
      (click)="goToProfile(notification().actor._id)"
    >
      <img
        [alt]="notification().actor.name"
        class="h-11 w-11 rounded-full object-cover"
        [src]="notification().actor.photo"
      /></button
    ><span
      class="absolute -bottom-1 -right-1 inline-flex h-5 w-5 items-center justify-center rounded-full bg-white ring-2 ring-white text-emerald-600"
    >
      <i
        [class]="
          notification().type === 'like_post'
            ? 'fa-regular fa-heart text-red-600'
            : notification().type === 'comment_post'
              ? 'fa-regular fa-comment text-blue-500'
              : 'fa-solid fa-crop-simple text-green-500'
        "
      ></i>
    </span>
  </div>
  <div class="min-w-0 flex-1">
    <div class="flex flex-wrap items-start justify-between gap-1.5 sm:gap-2">
      <p class="text-sm leading-6 text-slate-800">
        <button
          type="button"
          class="font-extrabold hover:text-[#1877f2] hover:underline"
          (click)="goToProfile(notification().actor._id)"
        >
          {{ notification().actor.name }}
        </button>
        {{
          notification().type === 'like_post'
            ? 'liked'
            : notification().type === 'comment_post'
              ? 'commented on'
              : 'shared'
        }}
        your post
      </p>
      <div class="flex items-center gap-1.5 sm:gap-2">
        <span class="text-xs font-semibold text-slate-500">{{
          notification().createdAt | formatTime
        }}</span>
        <button
          (click)="goToPostDetails(notification().entityId)"
          class="rounded-md px-2 py-1 text-xs font-bold text-[#1877f2] hover:bg-[#e7f3ff]"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <svg
          [class]="notification().isRead || isRead() ? 'hidden' : 'inline'"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-dot text-[#1877f2]"
          aria-hidden="true"
        >
          <circle cx="12.1" cy="12.1" r="1"></circle>
        </svg>
      </div>
    </div>
    <p class="mt-0.5 text-sm text-slate-600">{{ notification().entity.body }}</p>
    <div class="mt-2 flex items-center gap-2">
      <button
        (click)="readNotification(notification()._id)"
        [disabled]="isLoading()"
        [class]="notification().isRead || isRead() ? 'hidden' : 'inline-flex'"
        class="items-center gap-1.5 rounded-md bg-white px-2.5 py-1 text-xs font-bold text-[#1877f2] ring-1 ring-[#dbeafe] transition hover:bg-[#e7f3ff]"
      >
        <i [class]="isLoading() ? 'fa-solid fa-spin fa-spinner' : 'fa-solid fa-check'"></i>
        Mark as read
      </button>
      <span
        [class]="notification().isRead || isRead() ? 'inline-flex' : 'hidden'"
        class="items-center gap-1.5 text-xs font-semibold text-emerald-600"
      >
        <i class="fa-solid fa-check"></i>
        Read</span
      >
    </div>
  </div>
</article>
