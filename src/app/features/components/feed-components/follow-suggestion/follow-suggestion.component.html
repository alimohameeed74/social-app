<div class="p-2.5 rounded-xl bg-white shadow font-bold h-fit sticky! top-18 z-10">
  <h2 class="font-bold text-[16px] text-black flex justify-between items-center mb-4">
    <span>
      <i class="fa-solid fa-users text-fg-brand me-1"></i>
      Suggested Friends
    </span>
    <span
      [class]="suggestions().length === 0 ? 'hidden' : 'flex'"
      class="size-5 justify-center items-center rounded-[50%] bg-gray-200 text-gray-500 text-[12px]"
      >{{ suggestions().length }}</span
    >
  </h2>
  <div
    [class]="isLoading() || offline() || error() ? 'hidden' : ''"
    class="h-80 xl:h-120 scrollbar-hide overflow-y-auto"
  >
    @for (suggestion of suggestions(); track $index) {
      <app-suggestion-card [suggestion]="suggestion"></app-suggestion-card>
    }
  </div>
  <app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
  <app-error [class.hidden]="!error()"></app-error>
  <div [class]="!isLoading() ? 'hidden' : ''" class="h-100 xl:h-140 scrollbar-hide overflow-y-auto">
    @for (skelton of [1, 2, 3, 4, 5, 6]; track $index) {
      <app-suggestion-skelton></app-suggestion-skelton>
    }
  </div>

  <button
    (click)="goToSuggestions()"
    [class]="suggestions().length === 0 ? 'hidden' : 'inline-flex'"
    class="mt-3 w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-600 transition hover:bg-slate-100"
  >
    View more
  </button>
</div>
