<div class="mx-auto max-w-7xl py-3.5">
  <main class="min-w-0">
    <div class="mx-auto w-full md:max-w-3xl space-y-4">
      <button
        (click)="back()"
        [class]="isLoading() ? 'hidden' : 'inline-flex'"
        class="items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-arrow-left"
          aria-hidden="true"
        >
          <path d="m12 19-7-7 7-7"></path>
          <path d="M19 12H5"></path></svg
        >Back
      </button>
      @if (post()) {
        <app-feed-post-card
          (deletePostEvent)="handleChange($event)"
          [class.hidden]="isLoading()"
          [post]="post()!"
        ></app-feed-post-card>
      }
      <app-feed-post-skelton [class.hidden]="!isLoading()"></app-feed-post-skelton>
      <app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
      <app-error [class.hidden]="!error()"></app-error>
      <div
        [class]="emptyPost() ? '' : 'hidden'"
        class="rounded-2xl border border-slate-200 bg-white p-8 text-center text-sm text-slate-500 shadow-sm"
      >
        Post not found.
      </div>
    </div>
  </main>
</div>
