<div [class.hidden]="isDeleted()" class="relative flex items-start gap-2 mb-2">
  <img
    [alt]="comment().commentCreator.name"
    class="mt-0.5 h-8 w-8 rounded-full object-cover"
    [src]="comment().commentCreator.photo"
  />
  <div class="min-w-0 flex-1">
    <div class="relative max-w-full rounded-2xl bg-[#f0f2f5] px-3 py-2">
      <div class="flex items-start justify-between gap-2">
        <div>
          <p class="text-xs font-bold text-slate-900">{{ comment().commentCreator.name }}</p>
          <p class="text-xs text-slate-500">@{{ comment().commentCreator.username }}</p>
        </div>
        <div class="flex">
          <button
            [class.hidden]="otherUser()"
            [disabled]="deleteLoading()"
            (click)="deleteComment(comment()._id)"
            class="cursor-pointer text-xs me-1"
          >
            <i
              [class]="
                deleteLoading()
                  ? 'fa-spinner fa-spin fa-solid text-gray-400'
                  : 'fa-solid fa-trash text-gray-400 hover:text-red-500'
              "
            ></i>
          </button>
          <button
            [class.hidden]="otherUser()"
            (click)="showEditCommentModal.set(true)"
            class="cursor-pointer text-xs"
          >
            <i class="fa-solid fa-edit text-gray-400 hover:text-green-500"></i>
          </button>
        </div>
      </div>
      <p
        [class]="copyComment()!.content ? 'block' : 'hidden'"
        class="mt-1 whitespace-pre-wrap text-sm text-slate-800"
      >
        {{ copyComment()!.content }}
      </p>
      <img
        [src]="copyComment()!.image"
        [class.hidden]="!copyComment()!.image"
        alt="Reply"
        class="mt-1.5 max-h-44 w-full rounded-md object-cover"
      />
    </div>
    <div class="mt-1.5 flex items-center justify-between px-1">
      <div class="flex items-center gap-4">
        <span class="text-xs font-semibold text-slate-400">{{
          comment().createdAt | timeShortAgo
        }}</span>
        <button
          (click)="likeUnlikeComment(comment()._id)"
          [disabled]="likeLoading()"
          [class]="isLiked() ? 'text-[#1877f2]' : 'text-slate-500'"
          class="text-xs font-semibold hover:underline disabled:opacity-60"
        >
          @if (likeLoading()) {
            <i class="fa-solid fa-spinner fa-spin"></i>
          } @else {
            Like ({{ likeCount() }})
          }
        </button>
        <button
          (click)="showCommentReplies()"
          class="text-xs font-semibold hover:underline disabled:opacity-60 text-slate-500"
        >
          @if (showReply()) {
            Hide replies
          } @else {
            Reply ({{ replyCount() }})
          }
        </button>
      </div>
    </div>
  </div>
</div>

@if (showReply()) {
  <app-comment-replies
    [parentCommentName]="comment().commentCreator.name"
    (deleteReplyEvent)="decreaseReplyCount()"
    (createReplyEvent)="increaseReplyCount()"
    [postId]="comment().post"
    [commentId]="comment()._id"
  ></app-comment-replies>
}

@if (showEditCommentModal()) {
  <app-edit-comment
    (closeModalEvent)="showEditCommentModal.set(false)"
    [commentData]="{
      content: copyComment()!.content,
      image: copyComment()!.image,
      commentId: copyComment()!._id,
      postId: copyComment()!.post,
    }"
    (commentUpdated)="handleUpdateComment($event)"
  ></app-edit-comment>
}
