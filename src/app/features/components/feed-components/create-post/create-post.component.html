<div class="p-2 rounded-xl bg-white shadow">
  <form [formGroup]="postForm" (ngSubmit)="createPost()" class="flex flex-col gap-3 mb-3">
    <div class="flex justify-start items-start gap-2">
      <img [src]="userDetails()?.photo" alt="Account Logo" class="h-12 w-12 rounded-full" />
      <div class="flex flex-col gap-1">
        <h2 class="font-bold text-[16px] text-black">{{ userDetails()?.name }}</h2>
        <select
          id="privacy"
          name="privacy"
          formControlName="privacy"
          class="w-full p-2 bg-neutral-secondary-medium border border-default-medium text-sm rounded-[10px]"
        >
          <option selected value="public">Public</option>
          <option value="following">Following</option>
          <option value="only_me">Only me</option>
        </select>
      </div>
    </div>

    <textarea
      id="body"
      name="body"
      formControlName="body"
      rows="4"
      autocomplete="off"
      class="bg-neutral-secondary-medium border resize-none border-default-medium text-sm rounded-base block w-full p-3.5 shadow-xs placeholder:text-gray-400 placeholder:font-normal"
      [placeholder]="`What's on your mind, ${userDetails()?.name?.split(' ')?.[0]}?`"
    ></textarea>
    @if (
      getPostBodyController?.errors && getPostBodyController?.touched && selectedImgObj() === null
    ) {
      @if (getPostBodyController?.hasError('errLength')) {
        <div
          class="flex items-start sm:items-center p-4 mb-4 text-sm text-fg-danger-strong rounded-base bg-danger-soft"
          role="alert"
        >
          <svg
            class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
          </svg>
          <p>Must be at least 2 characters.</p>
        </div>
      }
    }
    <div class="flex flex-wrap items-center justify-between gap-2 border-t border-gray-400 pt-3">
      <div class="relative flex items-center gap-2">
        <label
          for="postImg"
          class="flex cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
          ><i class="fa-regular fa-image text-green-500"></i>
          <span class="hidden sm:inline">Photo/video</span></label
        >
        <input
          (change)="uploadImg($event)"
          id="postImg"
          accept="image/*"
          class="hidden"
          type="file"
        />
        <button
          (click)="toggleEmojes()"
          type="button"
          class="flex items-center cursor-pointer gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
        >
          <i class="fa-regular fa-face-smile text-yellow-500"></i>
          <span class="hidden sm:inline">Feeling/activity</span>
        </button>
        <emoji-mart
          (emojiSelect)="writeEmoji($event)"
          [class]="showEmojes() ? 'block' : 'hidden'"
          [style]="{
            position: 'absolute',
            top: '40px',
            left: '-10px',
            width: '270px',
            'z-index': 100,
          }"
        ></emoji-mart>
      </div>

      <button
        [disabled]="(postForm.invalid && selectedImgObj() === null) || isloading()"
        type="submit"
        class="flex items-center gap-2 rounded-md bg-[#1877f2] px-5 py-2 text-sm font-bold text-white shadow-sm transition-colors hover:bg-[#166fe5] disabled:opacity-60"
      >
        Post<i
          [class]="isloading() ? 'fa-solid fa-spinner fa-spin' : 'fa-regular fa-paper-plane'"
        ></i>
      </button>
    </div>
  </form>
  <div class="relative" [class]="imgSrc() ? 'block' : 'hidden'">
    <button
      (click)="removeUploadedImg()"
      [disabled]="isloading()"
      class="bg-white absolute top-2 inset-e-2 p-0.5 text-xs rounded-md hover:bg-red-500 hover:text-white text-black disabled:opacity-50"
    >
      <i class="fa-solid fa-trash cursor-pointer"></i>
    </button>
    <img [src]="imgSrc()" class="max-h-60 w-full object-cover rounded-xl" alt="Uploaded Image" />
  </div>
</div>
