@if (isloading()) {
  <app-loader></app-loader>
}

<form class="mt-3" [formGroup]="postForm" (ngSubmit)="updatePost(post()!._id)">
  <textarea
    formControlName="body"
    [(ngModel)]="postBody"
    placeholder="Write Your Post"
    maxlength="5000"
    class="min-h-[110px] w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-[#1877f2]/20 focus:border-[#1877f2] focus:ring-2 placeholder:text-gray-400 placeholder:font-normal"
    >{{ post()?.body }}</textarea
  >

  @if (getPostBodyController?.errors && getPostBodyController?.touched) {
    @if (getPostBodyController?.hasError('errLength')) {
      <div
        class="flex items-start sm:items-center p-4 mb-4 text-sm text-fg-danger-strong rounded-base bg-danger-soft"
        role="alert"
      >
        <svg
          class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
          />
        </svg>
        <p>Must be at least 2 characters.</p>
      </div>
    }
  }
  <div class="mt-2 flex items-center justify-end gap-2">
    <button
      (click)="goTo()"
      type="button"
      class="rounded-full border border-slate-300 bg-white px-3 py-1.5 text-xs font-bold text-slate-700 hover:bg-slate-100"
    >
      Cancel</button
    ><button
      type="submit"
      [disabled]="postForm.invalid"
      class="rounded-full bg-[#1877f2] px-3 py-1.5 text-xs font-bold text-white hover:bg-[#166fe5] disabled:opacity-60"
    >
      Save
    </button>
  </div>
</form>
