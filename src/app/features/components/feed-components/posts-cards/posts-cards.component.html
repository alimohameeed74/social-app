<div>
  @for (post of posts(); track post._id) {
    <app-feed-post-card [post]="post"></app-feed-post-card>
  }
</div>

<app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
<app-error [class.hidden]="!error()"></app-error>

<div [class]="contentLoading() ? '' : 'hidden'">
  @for (skelton of [1, 2, 3]; track $index) {
    <app-feed-post-skelton></app-feed-post-skelton>
  }
</div>

<div
  [class]="emptyPosts() ? '' : 'hidden'"
  class="rounded-2xl border border-slate-200 bg-white p-8 text-center text-sm text-slate-500 shadow-sm"
>
  No posts yet.
</div>
