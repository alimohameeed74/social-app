<div class="border-t border-slate-200 bg-[#f7f8fa] px-4 py-4 rounded-b-xl">
  <div class="space-y-2">
    @for (comment of comments(); track $index) {
      <app-comment-card
        (deleteCommentEvent)="deleteCommentEvent.emit('comment deleted'); getComments(postId())"
        [comment]="comment"
      ></app-comment-card>
    }

    <app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
    <app-error [class.hidden]="!error()"></app-error>
    <div class="mb-4" [class]="commentsLoading() ? '' : 'hidden'">
      @for (skelton of [1, 2]; track $index) {
        <app-comment-card-skelton></app-comment-card-skelton>
      }
    </div>
    <div
      [class]="emptyComments() ? '' : 'hidden'"
      class="rounded-2xl bg-white px-4 py-8 text-center"
    >
      <div
        class="mx-auto mb-3 inline-flex h-12 w-12 items-center justify-center rounded-full bg-[#eef3ff] text-[#1877f2]"
      >
        <i class="fa-regular fa-comment"></i>
      </div>
      <p class="text-lg font-extrabold text-slate-800">No Comments yet</p>
    </div>

    <!-- Create Comment Form -->
    <app-create-comment
      [class.hidden]="commentsLoading()"
      (commentCreated)="createCommentEvent.emit('comment created'); getComments(postId())"
      [postId]="postId()"
    ></app-create-comment>
  </div>
</div>
