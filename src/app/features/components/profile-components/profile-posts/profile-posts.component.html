@for (post of posts(); track $index) {
  <app-profile-post-card [post]="post"></app-profile-post-card>
}
<app-content-loader [class]="contentLoading() ? '' : 'hidden'"></app-content-loader>
<div
  [class]="emptyPosts() ? '' : 'hidden'"
  class="rounded-2xl border border-slate-200 bg-white p-8 text-center text-sm text-slate-500 shadow-sm"
>
  No posts yet.
</div>
